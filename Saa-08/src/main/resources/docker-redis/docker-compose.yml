services:
  redis:
    image: redis/redis-stack:7.4.0-v8
    container_name: redis-stack
    restart: always
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-stack-data:/data
    # 移除自定义 command，用 REDIS_ARGS 传递参数给 redis-server
    environment:
      - REDIS_ARGS=--requirepass 123456 --appendonly yes

volumes:
  redis-stack-data: